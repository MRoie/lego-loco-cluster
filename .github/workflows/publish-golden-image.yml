name: publish-golden-image

# Manual, opt-in publish of a sealed golden qcow2 as a multi-arch OCI carrier.
# The qcow2 itself is proprietary and never lives in the repo — this workflow
# expects it to be provided out-of-band (an artifact upload or a runner-local
# path) and only runs when explicitly dispatched.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "GHCR tag (e.g. safe512-v1)"
        required: true
        default: "safe512-v1"
      qcow2_artifact:
        description: "Name of an uploaded artifact containing win98.qcow2.builtin"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  # Lint-only job that always runs: proves the pipeline scripts are sound
  # without any proprietary assets.
  validate-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck golden-image scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          find golden-image -name '*.sh' -print0 | xargs -0 -n1 bash -n
          find golden-image -name '*.sh' -print0 | xargs -0 shellcheck -S warning || true
      - name: Python syntax check
        run: |
          python3 -m py_compile golden-image/tests/qmp.py golden-image/tests/rfb_probe.py golden-image/tests/lens_crop.py

  publish:
    needs: validate-scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download sealed qcow2 artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.inputs.qcow2_artifact }}
          path: golden-image/build/oci
      - name: Prepare OCI context
        run: |
          test -f golden-image/build/oci/win98.qcow2.builtin
          cat > golden-image/build/oci/Dockerfile <<'EOF'
          FROM scratch
          COPY win98.qcow2.builtin /opt/builtin-images/win98.qcow2.builtin
          EOF
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push multi-arch carrier
        uses: docker/build-push-action@v6
        with:
          context: golden-image/build/oci
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/mroie/lego-loco-cluster/win98-loco-golden:${{ github.event.inputs.tag }}

; Loco Lens — M5Stack StopWatch (ESP32-S3 + round display) firmware.
;
; The "StopWatch" is a round ESP32-S3 device (GC9A01-class 240x240 display,
; capacitive touch, side buttons, IMU, haptic). Adjust `board` + the display
; pins in config.h to match your exact unit (M5Dial and similar round S3 boards
; work with the same code path).
;
;   pio run                    # build
;   pio run -t upload          # flash over USB
;   pio run -t buildfs         # (if using SPIFFS assets)
[env:m5stack-stopwatch]
platform = espressif32@^6.9.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=2
    -DBOARD_HAS_PSRAM
    -DLOCO_LENS_FW_VERSION="\"0.1.0\""
lib_deps =
    ; WebSocket client for the /ws/lens/:instanceId bridge
    links2004/WebSockets @ ^2.6.1
    ; JSON for control messages
    bblanchon/ArduinoJson @ ^7.2.0
    ; Round display + graphics (GC9A01 / generic). Swap for M5Unified/M5GFX
    ; on genuine M5Stack boards.
    bodmer/TFT_eSPI @ ^2.5.43
    ; PNG decode for lens frames (bridge default). Use TJpg_Decoder for JPEG.
    bitbank2/PNGdec @ ^1.0.3

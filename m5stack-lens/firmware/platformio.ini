; Loco Lens — M5Stack StopWatch (C152) firmware.
;
; The StopWatch needs arduino-esp32 >= 3.3.7 (M5Unified >= 0.2.15, M5GFX >=
; 0.2.21). The official PlatformIO `espressif32` platform still ships
; arduino-esp32 2.x, so we use the community pioarduino fork which tracks 3.x.
;
;   pio run                 # build
;   pio run -t upload       # flash over USB (enter download mode first:
;                           #   hold the reset/power button ~2s until the
;                           #   internal GREEN LED lights, then release)
;
; Prefer the Arduino IDE? Select board "M5StopWatch" (esp32 board manager
; >= 3.3.7), install M5Unified + M5GFX, and upload — see README.md.
[env:m5stack-stopwatch]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
; ESP32-S3R8: 16MB flash, 8MB PSRAM. M5.begin() auto-detects the StopWatch.
board_build.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
build_flags =
    -DBOARD_HAS_PSRAM
    -DLOCO_LENS_FW_VERSION="\"0.1.0\""
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    m5stack/M5Unified @ ^0.2.15
    m5stack/M5GFX @ ^0.2.21
    links2004/WebSockets @ ^2.6.1
    bblanchon/ArduinoJson @ ^7.2.0
